<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>温暖黄昏 · 虚拟房间场景</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #1a1a2e; font-family: -apple-system, 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #info {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            pointer-events: none;
            user-select: none;
        }
        #sidebar {
            position: absolute;
            top: 0; right: 0;
            width: 240px;
            height: 100vh;
            background: rgba(20, 15, 25, 0.85);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(255,255,255,0.08);
            overflow-y: auto;
            padding: 12px;
            z-index: 10;
        }
        #sidebar::-webkit-scrollbar { width: 4px; }
        #sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
        .sb-title { color: rgba(255,255,255,0.9); font-size: 14px; font-weight: 600; margin: 16px 0 8px; }
        .sb-title:first-child { margin-top: 0; }
        .sb-item {
            display: flex; align-items: center; gap: 10px;
            padding: 6px 8px; border-radius: 6px; margin-bottom: 4px;
            transition: background 0.15s;
        }
        .sb-item:hover { background: rgba(255,255,255,0.06); }
        .sb-thumb {
            width: 48px; height: 48px; border-radius: 4px;
            background: rgba(255,255,255,0.04); flex-shrink: 0;
            overflow: hidden;
        }
        .sb-thumb canvas { width: 100%; height: 100%; }
        .sb-info { flex: 1; min-width: 0; }
        .sb-name { color: rgba(255,255,255,0.85); font-size: 12px; font-weight: 500; }
        .sb-meta { color: rgba(255,255,255,0.4); font-size: 10px; margin-top: 2px; }
    </style>

    <!-- Three.js r160 CDN (ES Modules) -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/",
            "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@3.5.3/lib/three-vrm.module.min.js"
        }
    }
    </script>
</head>
<body>

<div id="info">拖拽旋转 · 滚轮缩放 · 右键平移 · 拖拽移动家具/角色 · 点击窗帘开合</div>
<div id="sidebar"></div>

<!-- 主入口模块 -->
<script type="module" src="./js/main.js"></script>

</body>
</html>
