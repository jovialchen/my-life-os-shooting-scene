<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>温暖黄昏 · 虚拟房间场景</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #1a1a2e; }
        canvas { display: block; }
        #info {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-family: -apple-system, sans-serif;
            font-size: 12px;
            pointer-events: none;
            user-select: none;
        }
    </style>

    <!-- Import Map: Three.js r160 CDN (ES Modules) -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>

<div id="info">拖拽旋转 · 滚轮缩放 · 右键平移</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }     from 'three/addons/postprocessing/OutputPass.js';

// ============================================================
//  基础场景、相机、渲染器
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);   // 深蓝灰背景
scene.fog = new THREE.Fog(0x1a1a2e, 8, 25);     // 远处雾化

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 50);
camera.position.set(4.5, 3.5, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
document.body.appendChild(renderer.domElement);

// ============================================================
//  相机控制器
// ============================================================
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.2, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 2;
controls.maxDistance = 12;
controls.maxPolarAngle = Math.PI * 0.85;
controls.update();

// ============================================================
//  材质定义
// ============================================================
const matWall    = new THREE.MeshStandardMaterial({ color: 0xd4b896, roughness: 0.9 });
const matFloor   = new THREE.MeshStandardMaterial({ color: 0x8b6f4e, roughness: 0.8 });
const matCeiling = new THREE.MeshStandardMaterial({ color: 0xe8ddd0, roughness: 0.95 });
const matWood    = new THREE.MeshStandardMaterial({ color: 0x6b4226, roughness: 0.7 });
const matMetal   = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.3, metalness: 0.8 });
const matFabric  = new THREE.MeshStandardMaterial({ color: 0x8b4513, roughness: 0.95 });
const matFabricA = new THREE.MeshStandardMaterial({ color: 0x556b2f, roughness: 0.95 });
const matRug     = new THREE.MeshStandardMaterial({ color: 0x8b2500, roughness: 1.0 });
const matGlass   = new THREE.MeshStandardMaterial({ color: 0x87ceeb, transparent: true, opacity: 0.15, roughness: 0.05, metalness: 0.1 });
const matFrame   = new THREE.MeshStandardMaterial({ color: 0x3d2b1f, roughness: 0.6 });
const matLampSh  = new THREE.MeshStandardMaterial({ color: 0xf5deb3, roughness: 0.9, side: THREE.DoubleSide, transparent: true, opacity: 0.85 });
const matWhite   = new THREE.MeshStandardMaterial({ color: 0xf0ebe3, roughness: 0.9 });
const matSkin    = new THREE.MeshStandardMaterial({ color: 0xdeb887, roughness: 0.8 });
const matHair    = new THREE.MeshStandardMaterial({ color: 0x2c1810, roughness: 0.9 });
const matShoe    = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.7 });
const matPant    = new THREE.MeshStandardMaterial({ color: 0x2f4f4f, roughness: 0.9 });
const matBook1   = new THREE.MeshStandardMaterial({ color: 0x8b0000, roughness: 0.8 });
const matBook2   = new THREE.MeshStandardMaterial({ color: 0x006400, roughness: 0.8 });
const matBook3   = new THREE.MeshStandardMaterial({ color: 0x191970, roughness: 0.8 });
const matCushion = new THREE.MeshStandardMaterial({ color: 0xb8860b, roughness: 0.95 });

// ============================================================
//  房间构建
// ============================================================
const ROOM_W = 8, ROOM_H = 3.5, ROOM_D = 7;

/** 创建房间壳体：地板 + 天花板 + 四面墙（前面不渲染） */
function createRoom() {
    const room = new THREE.Group();

    // 地板
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W, ROOM_D), matFloor);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    room.add(floor);

    // 天花板
    const ceil = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W, ROOM_D), matCeiling);
    ceil.rotation.x = Math.PI / 2;
    ceil.position.y = ROOM_H;
    room.add(ceil);

    // 后墙 (z = -ROOM_D/2)
    const backWall = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W, ROOM_H), matWall);
    backWall.position.set(0, ROOM_H / 2, -ROOM_D / 2);
    backWall.receiveShadow = true;
    room.add(backWall);

    // 左墙 (x = -ROOM_W/2)
    const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_D, ROOM_H), matWall);
    leftWall.rotation.y = Math.PI / 2;
    leftWall.position.set(-ROOM_W / 2, ROOM_H / 2, 0);
    leftWall.receiveShadow = true;
    room.add(leftWall);

    // 右墙 (x = +ROOM_W/2)
    const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_D, ROOM_H), matWall);
    rightWall.rotation.y = -Math.PI / 2;
    rightWall.position.set(ROOM_W / 2, ROOM_H / 2, 0);
    rightWall.receiveShadow = true;
    room.add(rightWall);

    return room;
}

/** 在右墙上开一扇窗户 */
function createWindow() {
    const win = new THREE.Group();
    const W = 1.8, H = 2.0;
    const sillH = 0.9;

    // 窗框（深色木质）
    const fw = 0.08; // frame width
    const outer = new THREE.Mesh(
        new THREE.BoxGeometry(W + fw * 2, H + fw * 2, fw * 2),
        matFrame
    );
    outer.position.y = sillH + H / 2;
    win.add(outer);

    // 玻璃
    const glass = new THREE.Mesh(new THREE.PlaneGeometry(W, H), matGlass);
    glass.position.set(0, sillH + H / 2, 0);
    win.add(glass);

    // 十字窗棂
    const barH = new THREE.Mesh(new THREE.BoxGeometry(W, 0.05, 0.05), matFrame);
    barH.position.y = sillH + H / 2;
    win.add(barH);
    const barV = new THREE.Mesh(new THREE.BoxGeometry(0.05, H, 0.05), matFrame);
    barV.position.y = sillH + H / 2;
    win.add(barV);

    // 窗台
    const sill = new THREE.Mesh(new THREE.BoxGeometry(W + 0.3, 0.06, 0.2), matFrame);
    sill.position.y = sillH;
    sill.position.z = 0.08;
    win.add(sill);

    // 放在右墙上
    win.position.set(ROOM_W / 2 - 0.02, 0, -0.5);
    win.rotation.y = -Math.PI / 2;

    return win;
}

/** 地毯 */
function createRug() {
    const rug = new THREE.Mesh(new THREE.PlaneGeometry(3.5, 2.8), matRug);
    rug.rotation.x = -Math.PI / 2;
    rug.position.set(0, 0.005, 0.5);
    rug.receiveShadow = true;
    return rug;
}

// ============================================================
//  家具：沙发
// ============================================================
function createSofa() {
    const sofa = new THREE.Group();

    // 坐垫底座
    const base = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.4, 0.9), matFabric);
    base.position.y = 0.35;
    base.castShadow = true;
    sofa.add(base);

    // 靠背
    const back = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.7, 0.15), matFabric);
    back.position.set(0, 0.85, -0.375);
    back.castShadow = true;
    sofa.add(back);

    // 左扶手
    const armL = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.5, 0.9), matFabric);
    armL.position.set(-1.125, 0.6, 0);
    armL.castShadow = true;
    sofa.add(armL);

    // 右扶手
    const armR = armL.clone();
    armR.position.x = 1.125;
    sofa.add(armR);

    // 腿
    const legGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.15);
    [[-1, -0.3], [-1, 0.3], [1, -0.3], [1, 0.3]].forEach(([x, z]) => {
        const leg = new THREE.Mesh(legGeo, matWood);
        leg.position.set(x * 1.05, 0.075, z);
        leg.castShadow = true;
        sofa.add(leg);
    });

    // 靠枕
    const cGeo = new THREE.BoxGeometry(0.4, 0.4, 0.15);
    const cushion1 = new THREE.Mesh(cGeo, matCushion);
    cushion1.position.set(-0.7, 0.8, -0.2);
    cushion1.rotation.z = 0.15;
    sofa.add(cushion1);
    const cushion2 = new THREE.Mesh(cGeo, matFabricA);
    cushion2.position.set(0.7, 0.8, -0.2);
    cushion2.rotation.z = -0.1;
    sofa.add(cushion2);

    sofa.position.set(-1.5, 0, 0.5);
    sofa.rotation.y = Math.PI / 2;
    return sofa;
}

// ============================================================
//  家具：单人椅
// ============================================================
function createChair() {
    const chair = new THREE.Group();

    const seat = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.06, 0.55), matFabricA);
    seat.position.y = 0.5;
    seat.castShadow = true;
    chair.add(seat);

    const back = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.06), matFabricA);
    back.position.set(0, 0.83, -0.245);
    back.castShadow = true;
    chair.add(back);

    const legGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.47);
    [[-0.25, -0.2], [-0.25, 0.2], [0.25, -0.2], [0.25, 0.2]].forEach(([x, z]) => {
        const leg = new THREE.Mesh(legGeo, matWood);
        leg.position.set(x, 0.235, z);
        leg.castShadow = true;
        chair.add(leg);
    });

    chair.position.set(1.8, 0, 1.2);
    chair.rotation.y = -Math.PI / 4;
    return chair;
}

// ============================================================
//  家具：落地灯
// ============================================================
function createFloorLamp() {
    const lamp = new THREE.Group();

    // 底座
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.22, 0.04, 24), matMetal);
    base.position.y = 0.02;
    base.castShadow = true;
    lamp.add(base);

    // 灯杆
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 1.7, 12), matMetal);
    pole.position.y = 0.89;
    pole.castShadow = true;
    lamp.add(pole);

    // 灯罩（锥形）
    const shade = new THREE.Mesh(new THREE.ConeGeometry(0.25, 0.35, 24, 1, true), matLampSh);
    shade.position.y = 1.85;
    shade.castShadow = true;
    lamp.add(shade);

    // 内部灯泡用点光源模拟
    const bulb = new THREE.PointLight(0xffcc77, 1.5, 6);
    bulb.position.y = 1.75;
    bulb.castShadow = true;
    bulb.shadow.mapSize.set(512, 512);
    bulb.shadow.radius = 4;
    lamp.add(bulb);

    lamp.position.set(2.5, 0, -1.5);
    return lamp;
}

// ============================================================
//  家具：矮茶几
// ============================================================
function createCoffeeTable() {
    const table = new THREE.Group();

    // 桌面
    const top = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.55, 0.05, 32), matWood);
    top.position.y = 0.45;
    top.castShadow = true;
    top.receiveShadow = true;
    table.add(top);

    // 三条腿
    for (let i = 0; i < 3; i++) {
        const a = (i / 3) * Math.PI * 2;
        const leg = new THREE.Mesh(
            new THREE.CylinderGeometry(0.03, 0.03, 0.42, 8),
            matMetal
        );
        leg.position.set(Math.cos(a) * 0.35, 0.22, Math.sin(a) * 0.35);
        leg.castShadow = true;
        table.add(leg);
    }

    table.position.set(0.3, 0, 1.5);
    return table;
}

// ============================================================
//  家具：边桌 + 书本
// ============================================================
function createSideTable() {
    const table = new THREE.Group();

    const top = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.04, 24), matWood);
    top.position.y = 0.65;
    top.castShadow = true;
    top.receiveShadow = true;
    table.add(top);

    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.62, 8), matMetal);
    leg.position.y = 0.32;
    leg.castShadow = true;
    table.add(leg);

    const foot = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.03, 24), matMetal);
    foot.position.y = 0.015;
    table.add(foot);

    // 书本
    const book = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.06, 0.15), matBook1);
    book.position.set(0.05, 0.7, 0);
    book.rotation.y = 0.3;
    book.castShadow = true;
    table.add(book);

    table.position.set(-3.0, 0, -1.8);
    return table;
}

// ============================================================
//  家具：书架
// ============================================================
function createBookshelf() {
    const shelf = new THREE.Group();
    const w = 1.2, h = 2.0, d = 0.35;
    const t = 0.04; // 板厚

    // 侧板 ×2
    [-1, 1].forEach(side => {
        const panel = new THREE.Mesh(new THREE.BoxGeometry(t, h, d), matWood);
        panel.position.set(side * (w / 2), h / 2, 0);
        panel.castShadow = true;
        shelf.add(panel);
    });

    // 层板 ×4
    for (let i = 0; i <= 3; i++) {
        const plank = new THREE.Mesh(new THREE.BoxGeometry(w, t, d), matWood);
        plank.position.y = i * (h / 3) + t / 2;
        plank.receiveShadow = true;
        plank.castShadow = true;
        shelf.add(plank);
    }

    // 背板
    const backPanel = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.02), matWall);
    backPanel.position.set(0, h / 2, -d / 2 + 0.01);
    shelf.add(backPanel);

    // 书本（每层放几本）
    const bookMats = [matBook1, matBook2, matBook3];
    for (let row = 0; row < 3; row++) {
        const y = row * (h / 3) + t + 0.04;
        const count = 3 + Math.floor(Math.random() * 3);
        let x = -w / 2 + 0.12;
        for (let b = 0; b < count; b++) {
            const bw = 0.06 + Math.random() * 0.06;
            const bh = 0.2 + Math.random() * 0.1;
            const book = new THREE.Mesh(
                new THREE.BoxGeometry(bw, bh, 0.18),
                bookMats[b % 3]
            );
            book.position.set(x + bw / 2, y + bh / 2, 0);
            book.castShadow = true;
            shelf.add(book);
            x += bw + 0.01;
        }
    }

    shelf.position.set(1.0, 0, -ROOM_D / 2 + 0.2);
    return shelf;
}

// ============================================================
//  简单人形角色
// ============================================================
function createHumanoid() {
    const person = new THREE.Group();

    // 躯干
    const torso = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.6, 0.25), matWhite);
    torso.position.y = 1.15;
    torso.castShadow = true;
    person.add(torso);

    // 头
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.18, 24, 24), matSkin);
    head.position.y = 1.63;
    head.castShadow = true;
    person.add(head);

    // 头发
    const hair = new THREE.Mesh(new THREE.SphereGeometry(0.19, 24, 24, 0, Math.PI * 2, 0, Math.PI * 0.6), matHair);
    hair.position.y = 1.66;
    person.add(hair);

    // 眼睛
    const eyeGeo = new THREE.SphereGeometry(0.025, 12, 12);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.3 });
    [-0.065, 0.065].forEach(x => {
        const eye = new THREE.Mesh(eyeGeo, eyeMat);
        eye.position.set(x, 1.65, 0.15);
        person.add(eye);
    });

    // 腿 ×2
    const legGeo = new THREE.CylinderGeometry(0.07, 0.06, 0.7, 12);
    [-0.1, 0.1].forEach(x => {
        const leg = new THREE.Mesh(legGeo, matPant);
        leg.position.set(x, 0.5, 0);
        leg.castShadow = true;
        person.add(leg);

        // 鞋
        const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.06, 0.18), matShoe);
        shoe.position.set(x, 0.03, 0.03);
        shoe.castShadow = true;
        person.add(shoe);
    });

    // 手臂 ×2
    const armGeo = new THREE.CylinderGeometry(0.05, 0.04, 0.55, 12);
    [-0.3, 0.3].forEach(x => {
        const arm = new THREE.Mesh(armGeo, matSkin);
        arm.position.set(x, 1.05, 0);
        arm.rotation.z = x < 0 ? 0.12 : -0.12;
        arm.castShadow = true;
        person.add(arm);
    });

    person.position.set(1.5, 0, 0.3);
    person.rotation.y = -0.4; // 微微侧身
    return person;
}

// ============================================================
//  墙面装饰画
// ============================================================
function createWallArt() {
    const art = new THREE.Group();

    // 画框
    const frame = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.65, 0.04), matFrame);
    frame.castShadow = true;
    art.add(frame);

    // 画布（渐变色模拟）
    const canvas = new THREE.Mesh(new THREE.PlaneGeometry(0.78, 0.53),
        new THREE.MeshStandardMaterial({ color: 0xc2956b, roughness: 0.85 })
    );
    canvas.position.z = 0.025;
    art.add(canvas);

    // 装饰色块
    const colors = [0xdaa520, 0xcd853f, 0xa0522d, 0xf4a460];
    colors.forEach((c, i) => {
        const block = new THREE.Mesh(
            new THREE.PlaneGeometry(0.35, 0.22),
            new THREE.MeshStandardMaterial({ color: c, roughness: 0.9 })
        );
        block.position.set((i % 2 - 0.5) * 0.36, (i < 2 ? 0.13 : -0.13), 0.026);
        art.add(block);
    });

    art.position.set(-ROOM_W / 2 + 0.03, 2.0, -1.0);
    art.rotation.y = Math.PI / 2;
    return art;
}

// ============================================================
//  组装场景
// ============================================================
scene.add(createRoom());
scene.add(createWindow());
scene.add(createRug());
scene.add(createSofa());
scene.add(createChair());
scene.add(createFloorLamp());
scene.add(createCoffeeTable());
scene.add(createSideTable());
scene.add(createBookshelf());
scene.add(createHumanoid());
scene.add(createWallArt());

// ============================================================
//  灯光系统（暖色黄昏氛围）
// ============================================================

// 1) 环境光 — 柔和暖色基底
const ambient = new THREE.AmbientLight(0xffeedd, 0.3);
scene.add(ambient);

// 2) 主方向光 — 模拟夕阳从窗户照入
const sun = new THREE.DirectionalLight(0xffaa55, 1.8);
sun.position.set(5, 6, 2);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left   = -6;
sun.shadow.camera.right  =  6;
sun.shadow.camera.top    =  5;
sun.shadow.camera.bottom = -5;
sun.shadow.camera.near   =  0.1;
sun.shadow.camera.far    = 20;
sun.shadow.radius = 6;
sun.shadow.bias = -0.0005;
scene.add(sun);

// 3) 补光 — 从另一侧打一点冷色，增加层次
const fill = new THREE.DirectionalLight(0x8899bb, 0.3);
fill.position.set(-3, 4, -2);
scene.add(fill);

// 4) 窗外模拟光 — 一束暖光从窗户方向打入
const windowLight = new THREE.SpotLight(0xffcc88, 2.0, 10, Math.PI / 5, 0.5);
windowLight.position.set(ROOM_W / 2 + 0.5, 2.5, -0.5);
windowLight.target.position.set(0, 0, 0);
windowLight.castShadow = true;
windowLight.shadow.mapSize.set(1024, 1024);
scene.add(windowLight);
scene.add(windowLight.target);

// 5) 落地灯已在 createFloorLamp 中自带点光源

// ============================================================
//  后期处理（微泛光 + 色调映射）
// ============================================================
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(
    new THREE.Vector2(innerWidth, innerHeight),
    0.15,   // strength  — 轻微泛光
    0.6,    // radius
    0.85    // threshold
);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ============================================================
//  窗户光线投射可视化（体积光雾锥）
// ============================================================
const lightConeGeo = new THREE.CylinderGeometry(0.1, 1.8, 3.5, 16, 1, true);
const lightConeMat = new THREE.MeshBasicMaterial({
    color: 0xffddaa,
    transparent: true,
    opacity: 0.04,
    side: THREE.DoubleSide,
    depthWrite: false
});
const lightCone = new THREE.Mesh(lightConeGeo, lightConeMat);
lightCone.position.set(ROOM_W / 2 - 1.5, 1.8, -0.5);
lightCone.rotation.z = Math.PI / 2 + 0.3;
scene.add(lightCone);

// ============================================================
//  窗帘
// ============================================================
function createCurtains() {
    const group = new THREE.Group();
    const curtainMat = new THREE.MeshStandardMaterial({
        color: 0xd2b48c, roughness: 0.95, side: THREE.DoubleSide
    });

    [-0.85, 0.85].forEach(xOff => {
        const curtain = new THREE.Mesh(
            new THREE.PlaneGeometry(0.7, 2.2, 1, 12),
            curtainMat
        );
        // 微微波浪
        const pos = curtain.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            pos.setX(i, pos.getX(i) + Math.sin(pos.getY(i) * 3) * 0.04);
        }
        pos.needsUpdate = true;
        curtain.geometry.computeVertexNormals();
        curtain.position.set(xOff, 1.3, 0);
        curtain.castShadow = true;
        group.add(curtain);
    });

    // 窗帘杆
    const rod = new THREE.Mesh(
        new THREE.CylinderGeometry(0.02, 0.02, 2.2, 8),
        matMetal
    );
    rod.rotation.z = Math.PI / 2;
    rod.position.y = 2.45;
    group.add(rod);

    group.position.set(ROOM_W / 2 - 0.05, 0, -0.5);
    group.rotation.y = -Math.PI / 2;
    return group;
}
scene.add(createCurtains());

// ============================================================
//  窗台小盆栽
// ============================================================
function createPlant() {
    const plant = new THREE.Group();

    // 花盆
    const pot = new THREE.Mesh(
        new THREE.CylinderGeometry(0.08, 0.06, 0.12, 12),
        new THREE.MeshStandardMaterial({ color: 0xb5651d, roughness: 0.85 })
    );
    pot.position.y = 0.06;
    pot.castShadow = true;
    plant.add(pot);

    // 叶子（几个小球）
    const leafMat = new THREE.MeshStandardMaterial({ color: 0x2e8b57, roughness: 0.9 });
    for (let i = 0; i < 5; i++) {
        const leaf = new THREE.Mesh(
            new THREE.SphereGeometry(0.06 + Math.random() * 0.04, 8, 8),
            leafMat
        );
        const a = (i / 5) * Math.PI * 2;
        leaf.position.set(Math.cos(a) * 0.06, 0.16 + Math.random() * 0.08, Math.sin(a) * 0.06);
        leaf.castShadow = true;
        plant.add(leaf);
    }

    plant.position.set(ROOM_W / 2 - 0.1, 0.96, 0.3);
    return plant;
}
scene.add(createPlant());

// ============================================================
//  响应窗口大小变化
// ============================================================
window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
});

// ============================================================
//  动画循环
// ============================================================
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    composer.render();
}
animate();

</script>
